name: developer-landing

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - ./server/.env
    environment:
      - PORT=3001

  client:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - '5173:5173'
    command: sh -c "npm install && npm run dev -w client -- --host 0.0.0.0"
    environment:
      # Browser calls same-origin /api; Vite proxy reaches the server container by service name.
      - API_PROXY_TARGET=http://server:3001
    depends_on:
      - server
