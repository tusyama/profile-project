# API service (Railway). Frontend deploys separately on Vercel — see docs/DEPLOY.md.
# Root Directory in Railway must stay at repo root (not server/) so workspaces + this file apply.
[build]
# Railway runs npm install before this — do not run npm ci again (EBUSY on client/node_modules/.vite).
buildCommand = "npm run build:server"
watchPatterns = ["server/**", "package.json", "package-lock.json"]

[deploy]
# Run Node directly — npm as PID 1 intercepts SIGTERM and breaks Railway health checks.
startCommand = "node server/dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
